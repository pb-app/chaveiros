<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelador de Chaveiro 3D - Imagens</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f0f0; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 10;
            width: 320px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .user-info {
            font-size: 13px;
            color: #555;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }
        .user-info strong {
            display: block;
            color: #222;
            font-size: 15px;
        }
        button, input[type="file"], input[type="range"] {
            display: block;
            margin-top: 10px;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
            cursor: pointer;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
            background: #f9f9f9;
            padding: 8px;
            border-radius: 4px;
        }
        .checkbox-group input {
            margin-right: 8px;
            cursor: pointer;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            padding: 12px;
            transition: background 0.2s;
        }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #export-btn { background-color: #28a745; margin-top: 10px; }
        #export-btn:hover { background-color: #218838; }
        h2 { margin-top: 0; font-size: 18px; margin-bottom: 5px; }
        
        #preview-container {
            display: none;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fafafa;
        }
        #preview-canvas {
            width: 100%;
            height: auto;
            max-height: 150px;
            object-fit: contain;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), linear-gradient(-45deg, #ccc 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #ccc 75%), linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            border: 1px solid #aaa;
        }
        .help-text { font-size: 12px; color: #666; margin-bottom: 5px; display: block; }
        #loading { display: none; color: #ff6600; font-size: 14px; font-weight: bold; margin-bottom: 10px; text-align: center; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h2>Gerador de Chaveiro 3D</h2>
        <div class="user-info">
            <strong>Ageu Felipe Salto</strong>
            Supervisor Turno 3
        </div>

        <label for="img-upload">1. Suba uma Imagem (.PNG ou .JPG):</label>
        <input type="file" id="img-upload" accept=".png, .jpg, .jpeg">
        
        <div id="preview-container">
            <span class="help-text"><strong>Pré-visualização:</strong> O que estiver em PRETO será o desenho 3D.</span>
            <canvas id="preview-canvas"></canvas>
            
            <div class="checkbox-group">
                <input type="checkbox" id="invert-colors">
                <label for="invert-colors">Inverter (Usar se o fundo for escuro)</label>
            </div>

            <label for="threshold" class="help-text">Ajuste de Detalhe:</label>
            <input type="range" id="threshold" min="1" max="254" value="128">

            <button id="generate-btn">2. Gerar 3D</button>
        </div>

        <div id="loading">Processando malha 3D...</div>
        
        <button id="export-btn" style="display:none;">3. Exportar STL</button>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { SVGLoader } from 'three/addons/loaders/SVGLoader.js';
        import { STLExporter } from 'three/addons/exporters/STLExporter.js';

        let scene, camera, renderer, controls;
        let keychainGroup; 
        let originalImageObj = null;

        const BASE_THICKNESS = 3; 
        const LOGO_THICKNESS = 2; 

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe0e0e0);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, -60, 60);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, -20, 30);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const gridHelper = new THREE.GridHelper(100, 10);
            gridHelper.rotation.x = Math.PI / 2; 
            scene.add(gridHelper);

            // Eventos da Interface
            document.getElementById('img-upload').addEventListener('change', handleImageUpload);
            document.getElementById('threshold').addEventListener('input', updatePreviewCanvas);
            document.getElementById('invert-colors').addEventListener('change', updatePreviewCanvas);
            document.getElementById('generate-btn').addEventListener('click', processPreviewTo3D);
            document.getElementById('export-btn').addEventListener('click', exportSTL);
            window.addEventListener('resize', onWindowResize);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('export-btn').style.display = 'none';
            if (keychainGroup) {
                scene.remove(keychainGroup);
                keychainGroup = null;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    originalImageObj = img;
                    document.getElementById('preview-container').style.display = 'block';
                    updatePreviewCanvas();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Atualiza a visualização 2D em tempo real baseada nos ajustes
        function updatePreviewCanvas() {
            if (!originalImageObj) return;

            const canvas = document.getElementById('preview-canvas');
            const ctx = canvas.getContext('2d');

            // Limita o tamanho para não travar o navegador no processamento
            const MAX_WIDTH = 600;
            let width = originalImageObj.width;
            let height = originalImageObj.height;

            if (width > MAX_WIDTH) {
                height = Math.round((MAX_WIDTH / width) * height);
                width = MAX_WIDTH;
            }

            canvas.width = width;
            canvas.height = height;

            // Desenha a imagem original redimensionada
            ctx.drawImage(originalImageObj, 0, 0, width, height);

            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const invert = document.getElementById('invert-colors').checked;
            const threshold = parseInt(document.getElementById('threshold').value);

            // Filtro de Binarização
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                
                // Ignora pixels já transparentes
                if (a < 50) {
                    data[i+3] = 0;
                    continue;
                }

                // Calcula luminosidade
                const brightness = (r * 0.299 + g * 0.587 + b * 0.114);

                let isSolid = brightness < threshold; 
                
                if (invert) {
                    isSolid = brightness >= threshold; 
                }

                if (isSolid) {
                    // Pinta de preto sólido (Relevo)
                    data[i] = 0; data[i+1] = 0; data[i+2] = 0; data[i+3] = 255; 
                } else {
                    // Pinta de transparente (Fundo)
                    data[i+3] = 0; 
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
        }

        function processPreviewTo3D() {
            const canvas = document.getElementById('preview-canvas');
            const processedDataUrl = canvas.toDataURL('image/png');

            document.getElementById('loading').style.display = 'block';
            document.getElementById('generate-btn').disabled = true;

            // Configurações do rastreador
            const tracerOptions = {
                ltres: 1,
                qtres: 1,
                pathomit: 20, 
                colorsampling: 0,
                pal: [{r:0,g:0,b:0,a:255}, {r:255,g:255,b:255,a:0}] 
            };

            // Processa o canvas resultante em SVG e depois para 3D
            ImageTracer.imageToSVG(processedDataUrl, function(svgString) {
                generateKeychainFromSVG(svgString);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('generate-btn').disabled = false;
            }, tracerOptions);
        }

        function generateKeychainFromSVG(svgText) {
            if (keychainGroup) {
                scene.remove(keychainGroup);
            }

            keychainGroup = new THREE.Group();
            
            const baseMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5 });
            const logoMaterial = new THREE.MeshStandardMaterial({ color: 0xff6600, roughness: 0.5 });

            const loader = new SVGLoader();
            const svgData = loader.parse(svgText);
            const logoGroup = new THREE.Group();

            const logoExtrudeSettings = { depth: LOGO_THICKNESS, bevelEnabled: false };

            for (const path of svgData.paths) {
                if(path.color && path.color.getHex() !== 0x000000) continue; 

                const shapes = SVGLoader.createShapes(path);
                for (const shape of shapes) {
                    const geometry = new THREE.ExtrudeGeometry(shape, logoExtrudeSettings);
                    const mesh = new THREE.Mesh(geometry, logoMaterial);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    logoGroup.add(mesh);
                }
            }

            logoGroup.scale.set(0.05, -0.05, 1); 

            const box = new THREE.Box3().setFromObject(logoGroup);
            const center = new THREE.Vector3();
            box.getCenter(center);
            const size = new THREE.Vector3();
            box.getSize(size);

            logoGroup.position.x = -center.x;
            logoGroup.position.y = -center.y;
            logoGroup.position.z = BASE_THICKNESS; 

            const centeredLogoContainer = new THREE.Group();
            centeredLogoContainer.add(logoGroup);

            const margin = 4;
            const baseWidth = size.x + margin;
            const baseHeight = size.y + margin;

            const baseShape = createRoundedRectShape(baseWidth, baseHeight, 2); 
            
            const baseExtrudeSettings = {
                depth: BASE_THICKNESS,
                bevelEnabled: true,
                bevelSegments: 2,
                bevelSteps: 1,
                bevelSize: 0.5,
                bevelThickness: 0.5
            };

            const baseGeometry = new THREE.ExtrudeGeometry(baseShape, baseExtrudeSettings);
            baseGeometry.translate(-baseWidth / 2, -baseHeight / 2, 0);

            const baseMesh = new THREE.Mesh(baseGeometry, baseMaterial);
            baseMesh.castShadow = true;
            baseMesh.receiveShadow = true;

            keychainGroup.add(baseMesh);
            keychainGroup.add(centeredLogoContainer);

            scene.add(keychainGroup);
            document.getElementById('export-btn').style.display = 'block';
        }

        function createRoundedRectShape(width, height, radius) {
            const shape = new THREE.Shape();
            const x = 0; const y = 0;
            shape.moveTo(x, y + radius);
            shape.lineTo(x, y + height - radius);
            shape.quadraticCurveTo(x, y + height, x + radius, y + height);
            shape.lineTo(x + width - radius, y + height);
            shape.quadraticCurveTo(x + width, y + height, x + width, y + height - radius);
            shape.lineTo(x + width, y + radius);
            shape.quadraticCurveTo(x + width, y, x + width - radius, y);
            shape.lineTo(x + radius, y);
            shape.quadraticCurveTo(x, y, x, y + radius);
            return shape;
        }

        function exportSTL() {
            if (!keychainGroup) return;
            
            const exporter = new STLExporter();
            const stlString = exporter.parse(keychainGroup);
            
            const blob = new Blob([stlString], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.style.display = 'none';
            link.href = url;
            link.download = 'Chaveiro_Gerado.stl';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
